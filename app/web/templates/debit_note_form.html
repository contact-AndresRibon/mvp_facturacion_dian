{% extends "base.html" %}
{% block title %}Nueva nota debito{% endblock %}
{% block page_title %}Nueva nota debito{% endblock %}
{% block content %}
<div class="panel">
  <form method="post" action="/debit-notes/new" class="form">
    <label>Factura referencia</label>
    <select name="invoice_id" required>
      {% for inv in invoices %}
      <option value="{{ inv.id }}">{{ inv.number }} ({{ inv.status }})</option>
      {% endfor %}
    </select>
    <label>Producto</label>
    <select name="product_id" required>
      {% for p in products %}
      <option value="{{ p.id }}">{{ p.name }}</option>
      {% endfor %}
    </select>
    <label>Cantidad</label>
    <input type="number" name="quantity" step="0.01" min="0.01" value="1" required>
    <label>Fecha</label>
    <input type="date" name="issue_date" value="{{ today }}" required>
    <label>Codigo motivo (TODO-DIAN)</label>
    <input type="text" name="reason_code" value="1">
    <label>Descripcion</label>
    <input type="text" name="reason_text">
    <div class="actions"><button type="submit" class="btn">Crear nota debito</button></div>
  </form>
</div>
{% endblock %}
